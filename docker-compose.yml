services:
  db:
    image: postgres:18-bookworm
    container_name: ethiofund-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-ethiofund_db}
      POSTGRES_USER: ${DB_USER:-ethiofund_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-ethiofund_password}
    ports:
      - '5432:5432'
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./backend/database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${DB_USER:-ethiofund_user} -d ${DB_NAME:-ethiofund_db}']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 45s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: dev
    container_name: ethiofund-backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    command: pnpm dev
    environment:
      NODE_ENV: development
      PORT: ${PORT:-5000}
      DB_HOST: ${DB_HOST:-db}
      DB_PORT: ${DB_PORT:-5432}
      DB_NAME: ${DB_NAME:-ethiofund_db}
      DB_USER: ${DB_USER:-ethiofund_user}
      DB_PASSWORD: ${DB_PASSWORD:-ethiofund_password}
      JWT_SECRET: ${JWT_SECRET:-dev_only_jwt_secret_change_me}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      CHAPA_SECRET_KEY: ${CHAPA_SECRET_KEY:-}
      CHAPA_PUBLIC_KEY: ${CHAPA_PUBLIC_KEY}
      CHAPA_ENCRYPTION_KEY: ${CHAPA_ENCRYPTION_KEY}
      CHAPA_BASE_URL: ${CHAPA_BASE_URL:-https://api.chapa.co/v1}
      PAYMENT_MODE: ${PAYMENT_MODE:-mock}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-1.5-flash}
      CLIENT_URL: ${CLIENT_URL:-http://localhost:5173}
      SERVER_URL: ${SERVER_URL:-http://localhost:5000}
      CHOKIDAR_USEPOLLING: 'true'
    ports:
      - '5000:5000'
    volumes:
      - ./backend:/app
      - backend_node_modules:/app/node_modules
      - backend_uploads:/app/uploads
    healthcheck:
      test:
        [
          'CMD-SHELL',
          "node -e \"fetch('http://127.0.0.1:5000/health').then((response) => { if (!response.ok) throw new Error('bad status'); return response.json(); }).then((body) => { if (body.status !== 'OK' || body.database !== 'Connected') throw new Error('unexpected health payload'); }).catch(() => process.exit(1));\"",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 45s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: dev
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:5000/api}
    container_name: ethiofund-frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    command: pnpm dev
    environment:
      VITE_API_URL: ${VITE_API_URL:-http://localhost:5000/api}
      CHOKIDAR_USEPOLLING: 'true'
    ports:
      - '5173:5173'
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    healthcheck:
      test:
        [
          'CMD-SHELL',
          "node -e \"fetch('http://127.0.0.1:5173').then((response) => { if (!response.ok) throw new Error('bad status'); }).catch(() => process.exit(1));\"",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  pgadmin:
    image: dpage/pgadmin4:8.13
    container_name: ethiofund-pgadmin
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL:-admin@ethiofund.local}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD:-pgadmin123}
      PGADMIN_CONFIG_SERVER_MODE: 'True'
      PGADMIN_SERVER_JSON_FILE: /pgadmin4/servers.json
    ports:
      - '8080:80'
    volumes:
      - pgadmin_data:/var/lib/pgadmin
      - ./docker/pgadmin-servers.json:/pgadmin4/servers.json:ro

  tunnel:
    image: cloudflare/cloudflared:latest
    container_name: ethiofund-tunnel
    restart: unless-stopped
    profiles:
      - tunnel
    depends_on:
      - backend
    command: tunnel --no-autoupdate --url http://backend:5000

volumes:
  db_data:
  backend_node_modules:
  backend_uploads:
  frontend_node_modules:
  pgadmin_data: